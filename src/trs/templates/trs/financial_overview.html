{% extends "trs/base.html" %}
{% load trs_formatting %}

{% block full-width %}
  <h1>{{ view.title }}</h1>

  <ul>
    {% for download_link in view.download_links %}
      <li>
        <a href="{{ download_link.url }}"
           hx-boost="false">
          {{ download_link.name }}
          <span class="inline-icon icon-[mdi--microsoft-excel]"></span>
        </a>
      </li>
    {% endfor %}
  </ul>

{% endblock %}
