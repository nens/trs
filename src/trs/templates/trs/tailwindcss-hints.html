<h1>Hints for tailwindcss</h1>

<p>
  Alert classes are generated dynamically, so tailwindcss will never notice
  "alert-success". This file helps get those classes detected and used by tailwindcss.
</p>

<div class="alert-success"></div>
<div class="alert-info"></div>
<div class="alert-warning"></div>
<div class="alert-error"></div>
<progress class="progress-success"></progress>
<progress class="progress-warning"></progress>
<progress class="progress-error"></progress>
